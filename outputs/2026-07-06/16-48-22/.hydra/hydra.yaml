hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - policy=pusht/lewm
    - seed=42
    - eval.num_eval=10
    - eval.goal_offset_steps=25
    - eval.eval_budget=50
    - world.num_envs=10
    - plan_config.horizon=5
    - plan_config.action_block=5
    - plan_config.receding_horizon=1
    - solver.num_samples=32
    - solver.n_steps=3
    - solver.topk=8
    - solver.var_scale=1.0
    - solver.device=cuda
    - output.filename=orig_cem_same_as_detprior_n10.txt
  job:
    name: eval
    chdir: null
    override_dirname: eval.eval_budget=50,eval.goal_offset_steps=25,eval.num_eval=10,output.filename=orig_cem_same_as_detprior_n10.txt,plan_config.action_block=5,plan_config.horizon=5,plan_config.receding_horizon=1,policy=pusht/lewm,seed=42,solver.device=cuda,solver.n_steps=3,solver.num_samples=32,solver.topk=8,solver.var_scale=1.0,world.num_envs=10
    id: ???
    num: ???
    config_name: pusht
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.3
    version_base: '1.3'
    cwd: /data/zflin/lewm_re/le-wm
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /data/zflin/lewm_re/le-wm/config/eval
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /data/zflin/lewm_re/le-wm/outputs/2026-07-06/16-48-22
    choices:
      solver: cem
      launcher: local
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
